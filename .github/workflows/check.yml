name: check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shell tooling
        run: sudo apt-get update && sudo apt-get install -y bats ripgrep shellcheck shfmt zsh
      - name: Run checks
        run: make check
