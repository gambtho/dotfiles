model_list:
  # Claude
  - { model_name: claude-opus-4-7,        litellm_params: { model: github_copilot/claude-opus-4.7 } }
  - { model_name: claude-opus-4-6,        litellm_params: { model: github_copilot/claude-opus-4.6 } }
  - { model_name: claude-opus-4-6-1m,     litellm_params: { model: github_copilot/claude-opus-4.6-1m } }
  - { model_name: claude-sonnet-4-6,      litellm_params: { model: github_copilot/claude-sonnet-4.6 } }
  - { model_name: claude-sonnet-4-5,      litellm_params: { model: github_copilot/claude-sonnet-4.5 } }
  - { model_name: claude-haiku-4-5,       litellm_params: { model: github_copilot/claude-haiku-4.5 } }

  # OpenAI (400k ctx / 128k out)
  - { model_name: gpt-5-4,                litellm_params: { model: github_copilot/gpt-5.4 } }
  - { model_name: gpt-5-4-mini,           litellm_params: { model: github_copilot/gpt-5.4-mini } }
  - { model_name: gpt-5-2-codex,          litellm_params: { model: github_copilot/gpt-5.2-codex } }

  # Google
  - { model_name: gemini-3-1-pro-preview, litellm_params: { model: github_copilot/gemini-3.1-pro-preview } }
  - { model_name: gemini-2-5-pro,         litellm_params: { model: github_copilot/gemini-2.5-pro } }

  # Experimental
  - { model_name: goldeneye,              litellm_params: { model: github_copilot/goldeneye } }

litellm_settings:
  disable_copilot_system_to_assistant: true
  drop_params: true
  # Overflow routing: 4.7 is 200k-only upstream — if a request blows the window,
  # retry on 4.6-1m (1M ctx). LiteLLM catches ContextWindowExceededError here.
  context_window_fallbacks:
    - claude-opus-4-7: ["claude-opus-4-6-1m"]

general_settings:
  master_key: sk-litellm-local-dev-key-change-me
