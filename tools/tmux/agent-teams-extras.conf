#!/usr/bin/env bash
# tools/tmux/agent-teams-extras.conf
# Sourced from tmux.conf.symlink between idempotency markers.
# Vi-mode copy + Windows clipboard (win32yank) integration.

setw -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y               send-keys -X copy-pipe-and-cancel "win32yank -i --crlf"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "win32yank -i --crlf"
